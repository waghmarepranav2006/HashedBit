<!DOCTYPE html>
<html>
<body>

    <h3>1. Even Numbers (1-100)</h3>
    <div id="evenDisplay"></div>

    <hr>

    <h3>2. Calculator</h3>
    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    <select id="operator">
        <option value="add">+</option>
        <option value="sub">-</option>
        <option value="mul">*</option>
        <option value="div">/</option>
    </select>
    <button onclick="runCalculator()">Calculate</button>
    <p>Result: <span id="calcResult"></span></p>

    <hr>

    <h3>3. Tax Calculator</h3>
    <input type="number" id="salary" placeholder="Enter Salary">
    <button onclick="calculateTax()">Find Tax</button>
    <p>Tax: <span id="taxResult"></span></p>

    <hr>

    <h3>4. Sum of Product of Digits</h3>
    <input type="number" id="n1" placeholder="n1">
    <input type="number" id="n2" placeholder="n2">
    <button onclick="calculateSumProd()">Find Sum</button>
    <p>Sum of Products: <span id="sumProdResult"></span></p>

    <script src="script.js"></script>
</body>
</html>
